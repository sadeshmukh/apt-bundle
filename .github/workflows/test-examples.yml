name: Test Examples

on:
  push:
    branches:
      - main
    paths:
      - 'examples/**'
      - '.github/workflows/test-examples.yml'
      - '!.cursor/**'

permissions:
  contents: read

jobs:
  test-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: 1-via-install-sh
            dockerfile: Dockerfile
          - example: 1-via-install-sh
            dockerfile: Dockerfile.traditional
          - example: 2-via-ppa
            dockerfile: Dockerfile
          - example: 2-via-ppa
            dockerfile: Dockerfile.traditional
          - example: 3-via-apt-get
            dockerfile: Dockerfile
          - example: 3-via-apt-get
            dockerfile: Dockerfile.traditional
          - example: 4-complex-via-apt-get
            dockerfile: Dockerfile
          - example: 4-complex-via-apt-get
            dockerfile: Dockerfile.traditional
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: examples/${{ matrix.example }}
        run: |
          IMAGE_NAME="${{ matrix.example }}"
          IMAGE_TAG="test-${{ matrix.dockerfile }}"
          make build DOCKERFILE=${{ matrix.dockerfile }} IMAGE_NAME=${IMAGE_NAME} IMAGE_TAG=${IMAGE_TAG}
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Validate packages
        working-directory: examples/${{ matrix.example }}
        run: |
          make test IMAGE_NAME=${IMAGE_NAME} IMAGE_TAG=${IMAGE_TAG}
          echo "✓ Validation passed for ${{ matrix.example }} using ${{ matrix.dockerfile }}"

      - name: Verify apt-bundle (for Dockerfile only)
        if: matrix.dockerfile == 'Dockerfile'
        run: |
          docker run --rm ${IMAGE_NAME}:${IMAGE_TAG} apt-bundle --version
          echo "✓ apt-bundle verified for ${{ matrix.example }}"

