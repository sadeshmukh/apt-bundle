%echo Generating apt-bundle repository signing key
Key-Type: RSA
Key-Length: 4096
Subkey-Type: RSA
Subkey-Length: 4096
Name-Real: apt-bundle Repository Signing Key
Name-Email: maintainers@apt-bundle.org
# No expiration for repository signing key (set to 0)
# Repository signing keys typically don't expire to avoid breaking
# package installations when keys expire
Expire-Date: 0
# No passphrase protection (required for CI/CD automation)
# The private key will be stored securely in GitHub Secrets
%no-protection
%commit
%echo Key generation complete

