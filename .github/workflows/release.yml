name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'examples/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_release.outputs.version }}
      tag: ${{ steps.check_release.outputs.tag }}
      skip: ${{ steps.check_release.outputs.skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Read VERSION file
        id: version
        run: |
          MAJOR_MINOR=$(cat VERSION | tr -d '[:space:]')
          echo "major_minor=${MAJOR_MINOR}" >> $GITHUB_OUTPUT
          echo "Read version: ${MAJOR_MINOR}"

      - name: Calculate next patch version
        id: next_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR_MINOR="${{ steps.version.outputs.major_minor }}"
          echo "Looking for existing releases matching ${MAJOR_MINOR}.*"
          
          # Get all releases matching the major.minor prefix
          RELEASES=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" | \
            jq -r ".[].tag_name" | grep "^v${MAJOR_MINOR}\." || true)
          
          if [ -z "$RELEASES" ]; then
            PATCH=0
          else
            # Extract patch versions and find the maximum
            MAX_PATCH=$(echo "$RELEASES" | sed "s/^v${MAJOR_MINOR}\.//" | sort -n | tail -1)
            PATCH=$((MAX_PATCH + 1))
          fi
          
          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Calculated next version: ${VERSION}"

      - name: Check if release already exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          if curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" | \
            grep -q '"id"'; then
            echo "Release ${TAG} already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          echo "version=${{ steps.next_version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "tag=${{ steps.next_version.outputs.tag }}" >> $GITHUB_OUTPUT

  build:
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            debarch: amd64
          - goarch: arm64
            debarch: arm64
          - goarch: arm
            debarch: armhf
            goarm: 7
          - goarch: 386
            debarch: i386
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build and package for architecture
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          VERSION: ${{ needs.release.outputs.version }}
          NFPM_VERSION: ${{ needs.release.outputs.version }}
          NFPM_ARCH: ${{ matrix.debarch }}
        run: |
          # Build binary for this architecture
          mkdir -p build dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} GOARM=${GOARM} \
            go build -ldflags="-s -w" -o build/apt-bundle ./cmd/apt-bundle
          
          # Substitute template variables in nfpm config
          # nfpm v2 doesn't automatically process {{ .Version }} and {{ .Arch }} templates
          # from environment variables, so we substitute them manually
          sed -e "s|{{ .Version }}|${VERSION}|g" \
              -e "s|{{ .Arch }}|${NFPM_ARCH}|g" \
              .nfpm.yaml > .nfpm-${NFPM_ARCH}.yaml
          
          # Create .deb package
          nfpm package \
            --config .nfpm-${NFPM_ARCH}.yaml \
            --target dist/ \
            --packager deb
          
          # Clean up temporary config
          rm .nfpm-${NFPM_ARCH}.yaml
          
          # Rename package to expected format: apt-bundle_VERSION_linux_ARCH.deb
          ACTUAL_PACKAGE=$(find dist -maxdepth 1 -name "*.deb" -type f | head -1)
          
          if [ -z "$ACTUAL_PACKAGE" ]; then
            echo "Error: No .deb package found in dist/"
            exit 1
          fi
          
          EXPECTED_NAME="apt-bundle_${VERSION}_linux_${NFPM_ARCH}.deb"
          
          if [ "$(basename "$ACTUAL_PACKAGE")" != "$EXPECTED_NAME" ]; then
            mv "$ACTUAL_PACKAGE" "dist/${EXPECTED_NAME}"
          fi
          
          echo "Created: dist/${EXPECTED_NAME}"
          
          # Upload artifact for later collection
          mkdir -p artifacts
          cp "dist/${EXPECTED_NAME}" artifacts/

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ matrix.debarch }}
          path: artifacts/*.deb
          retention-days: 1

  create-release:
    needs: [release, build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: deb-packages-*
          path: packages
          merge-multiple: true

      - name: Verify all packages downloaded
        run: |
          echo "Checking for packages..."
          PACKAGE_COUNT=$(find packages -name "*.deb" -type f | wc -l)
          echo "Found ${PACKAGE_COUNT} packages"
          
          if [ "$PACKAGE_COUNT" -ne 4 ]; then
            echo "Error: Expected 4 packages (amd64, arm64, armhf, i386), found ${PACKAGE_COUNT}"
            ls -la packages/
            exit 1
          fi
          
          echo "All packages present:"
          ls -lh packages/*.deb

      - name: Generate checksums
        run: |
          cd packages
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${{ needs.release.outputs.version }}"
          
          # Find previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "# Release ${VERSION}" > release-notes.md
          echo "" >> release-notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" >> release-notes.md
            echo "" >> release-notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%an)" --no-merges >> release-notes.md
          else
            echo "Initial release of apt-bundle" >> release-notes.md
          fi
          
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Packages" >> release-notes.md
          echo "" >> release-notes.md
          echo "| Architecture | File | Size |" >> release-notes.md
          echo "|-------------|------|------|" >> release-notes.md
          ls -lh packages/*.deb | awk '{print "| " gensub(/.*_linux_([^.]+)\.deb/, "\\1", "g", $9) " | " $9 " | " $5 " |"}' >> release-notes.md
          
          echo "" >> release-notes.md
          echo "## Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo 'curl -sSL https://apt-bundle.github.io/install.sh | sudo bash' >> release-notes.md
          echo '```' >> release-notes.md
          
          echo "Generated release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${{ needs.release.outputs.version }}"
          
          # Check if release already exists (race condition protection)
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists (race condition detected)"
            echo "This is expected if multiple jobs tried to create the same release"
            exit 0
          fi
          
          # Create release with all packages and checksums
          gh release create "${TAG}" \
            --title "apt-bundle ${VERSION}" \
            --notes-file release-notes.md \
            packages/*.deb \
            packages/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}"
          
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- Release URL: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          ls -lh packages/*.deb | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checksums" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat packages/SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

