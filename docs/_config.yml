title: apt-bundle
description: A declarative package manager for apt, inspired by Homebrew's brew bundle
url: https://apt-bundle.org
baseurl: ""

# Theme
remote_theme: kitian616/jekyll-TeXt-theme

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# TeXt Theme Configuration
text_skin: default

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - testing.md

# Navigation
nav_order: 1
aux_links:
  "GitHub Repository":
    - https://github.com/apt-bundle/apt-bundle

# Footer content
footer_content: "Released under the MIT License"

